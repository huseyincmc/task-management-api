server:
  port: 8080

spring:
  application:
    name: api-gateway

  profiles:
    default: local

resilience4j:
  circuitbreaker:
    instances:
      task-service-gateway-circuit-breaker:
        failure-rate-threshold: 50
        minimum-number-of-calls: 4
        sliding-window-size: 4
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
      notification-service-gateway-circuit-breaker:
        failure-rate-threshold: 50
        minimum-number-of-calls: 4
        sliding-window-size: 4
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
