services:
  app:
    build:
      context: ./task-management-api
    container_name: task-management-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/taskdb
      SPRING_DATASOURCE_USERNAME: rambo
      SPRING_DATASOURCE_PASSWORD: 12345
    ports:
      - "8082:8081"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_USER: rambo
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rambo -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
