spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:taskdb}
    username: ${POSTGRES_USER:rambo}
    password: ${POSTGRES_PASSWORD:12345}

  data:
    redis:
      host: localhost
      port: 6379

services:
  notification:
    url: ${NOTIFICATION_SERVICE_URL:http://notification-service}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    hostname: localhost
